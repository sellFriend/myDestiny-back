# H2 in-memory DB (MariaDB 호환 모드)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MariaDB;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Kakao OAuth2 (테스트용 더미 — 실제 인증 호출 없음)
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# JWT
app.jwt.secret=test-jwt-secret-key-must-be-at-least-32-characters-long
app.jwt.access-token-expiry=3600000
app.jwt.refresh-token-expiry=1209600000

# OAuth2 redirect
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback

# CORS
app.cors.allowed-origins=http://localhost:3000

# Form
app.form.base-url=http://localhost:3000/form
app.frontend.base-url=http://localhost:3000

# 전화번호 AES-256-GCM 암호화 키 (테스트용 32바이트 고정 키)
app.phone.encryption-key=MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=

# OCI Object Storage (테스트용 더미)
app.storage.endpoint=http://localhost:9000
app.storage.bucket=test-bucket
app.storage.access-key=test-access-key
app.storage.secret-key=test-secret-key
app.storage.region=us-east-1
