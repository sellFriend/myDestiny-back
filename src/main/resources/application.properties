spring.application.name=My-Destiny-Server
server.port=8888
server.servlet.context-path=/destiny

# DataSource
spring.datasource.url=jdbc:mariadb://localhost:3307/my_destiny?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# JWT
app.jwt.secret=${JWT_SECRET:my-destiny-jwt-secret-key-must-be-at-least-32-characters-long}
app.jwt.access-token-expiry=86400000
app.jwt.refresh-token-expiry=1209600000

# OAuth2 redirect (React 프론트엔드 URL)
app.oauth2.redirect-uri=${FRONTEND_URL:http://localhost:3000}/oauth2/callback

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000},http://localhost:5173

# 전화번호 AES-256-GCM 암호화 키 (base64 인코딩된 32바이트)
# 운영환경: PHONE_ENCRYPTION_KEY 환경변수로 반드시 교체할 것
app.phone.encryption-key=${PHONE_ENCRYPTION_KEY:bXlkZXN0aW55LWxvY2FsLWVuY3J5cHQta2V5LWRldiE=}

# 친구 초대 폼 링크 기반 URL
app.form.base-url=${FRONTEND_URL:http://localhost:3000}/form

# 프론트엔드 기본 URL (초대 링크 생성용)
app.frontend.base-url=${FRONTEND_URL:http://localhost:3000}

# SMS 제공사: log(개발용) | aligo(알리고) | nhn(NHN Cloud)
app.sms.provider=${SMS_PROVIDER:log}

# 이메일 발송 설정 (SMS_PROVIDER=email 일 때 사용)
# B가 요청 시 email 필드로 수신 주소 지정 — 별도 to 설정 불필요
app.sms.email.from=${EMAIL_OTP_FROM:your@email.com}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:gmail-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 알리고 설정 (SMS_PROVIDER=aligo 일 때 사용)
app.sms.aligo.key=${ALIGO_API_KEY:dummy}
app.sms.aligo.user-id=${ALIGO_USER_ID:dummy}
app.sms.aligo.sender-no=${ALIGO_SENDER_NO:01000000000}

# NHN Cloud 설정 (SMS_PROVIDER=nhn 일 때 사용)
app.sms.nhn.app-key=${NHN_SMS_APP_KEY:dummy}
app.sms.nhn.secret-key=${NHN_SMS_SECRET_KEY:dummy}
app.sms.nhn.sender-no=${NHN_SMS_SENDER_NO:01000000000}

# Oracle Object Storage (S3 호환)
app.storage.endpoint=${OCI_STORAGE_ENDPOINT:https://objectstorage.ap-chuncheon-1.oraclecloud.com}
app.storage.bucket=${OCI_STORAGE_BUCKET:my-destiny-bucket}
app.storage.access-key=${OCI_ACCESS_KEY:your-access-key}
app.storage.secret-key=${OCI_SECRET_KEY:your-secret-key}
app.storage.region=${OCI_STORAGE_REGION:ap-chuncheon-1}

# Logging
logging.level.com.mydestiny=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
